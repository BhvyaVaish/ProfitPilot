<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ProfitPilot - Billing</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header class="no-print">
    <div class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-orange);"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg> ProfitPilot</div>
    <nav class="top-nav">
      <a href="index.html" class="nav-item">Home</a>
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="billing.html" class="nav-item active">Billing</a>
      <a href="inventory.html" class="nav-item">Inventory</a>
      <a href="tax.html" class="nav-item">Tax Estimator</a>
      <a href="chatbot.html" class="nav-item">Chatbot</a>
    </nav>
    <div class="user-profile">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="text-muted" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </header>

  <main class="main-content no-print">
    <div class="page-header">
      <h2>Create Bill</h2>
    </div>

    <div class="grid-2">
      <div class="card" style="align-self: flex-start;">
        <h3 class="mb-2">Search Product</h3>
        <input type="text" id="product-search" class="input-control mb-2" placeholder="Start typing product name...">
        <div id="search-suggestions" style="max-height: 300px; overflow-y: auto;"></div>
      </div>

      <div class="card">
        <h3 class="mb-2">Current Cart</h3>
        <div class="table-container mb-2">
            <table>
                <thead>
                    <tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr>
                </thead>
                <tbody id="cart-body">
                    <tr><td colspan="5" class="text-muted text-center">Cart is empty</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="grid-2 mb-2" style="gap: 16px; margin-top: 16px;">
            <div>
                <label class="text-muted" style="font-size: 0.85rem; display:block; margin-bottom: 4px;">Manual GST Override (%)</label>
                <input type="number" id="manual-gst" class="input-control" placeholder="Leave blank for Auto GST" step="0.1" min="0">
            </div>
            <div>
                <label class="text-muted" style="font-size: 0.85rem; display:block; margin-bottom: 4px;">Platform Fee (₹)</label>
                <input type="number" id="manual-fee" class="input-control" placeholder="e.g. 10.00" value="10.00" step="0.01" min="0">
            </div>
        </div>

        <div class="flex-between" style="border-top: 1px solid var(--border); padding-top: 16px;">
            <h3>Total: <span id="cart-total" class="text-blue">₹0</span></h3>
            <button id="generate-bill-btn" class="btn btn-primary" disabled>Generate Bill</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Invoice Modal -->
  <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="invoice-modal">
          <h2 class="text-center mb-1">STOCKPILOT AI</h2>
          <div class="text-center text-muted mb-2">Invoice #<span id="inv-number"></span></div>
          <div class="text-center text-muted mb-3">Date: <span id="inv-date"></span></div>
          
          <div style="border-top: 1px dashed var(--border); padding: 16px 0 0 0;" class="mb-3">
              <div class="flex-between mb-1 text-muted"><small>ITEM</small><small>AMOUNT</small></div>
              <div id="inv-items" class="mb-2"></div>
          </div>

          <div style="border-top: 1px dashed var(--border); padding: 16px 0;" class="mb-3" id="inv-taxes">
              <div class="flex-between mb-1 text-muted"><small>Subtotal</small><small id="inv-subtotal"></small></div>
              <div class="flex-between mb-1 text-muted"><small id="lbl-cgst">CGST (Auto)</small><small id="inv-cgst"></small></div>
              <div class="flex-between mb-1 text-muted"><small id="lbl-sgst">SGST (Auto)</small><small id="inv-sgst"></small></div>
              <div class="flex-between mb-1 text-muted"><small>Platform Fee</small><small id="inv-fee">₹10.00</small></div>
          </div>
          
          <div class="flex-between mb-3" style="border-top: 2px solid var(--border); padding-top: 16px;">
              <h3>GRAND TOTAL</h3>
              <h3 id="inv-total"></h3>
          </div>
          
          <div class="text-center gap-1 flex-between no-print">
              <button class="btn" style="flex:1; justify-content:center" onclick="closeInvoice()">Close</button>
              <button class="btn btn-primary" style="flex:1; justify-content:center" onclick="window.print()">Print</button>
          </div>
      </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/billing.js"></script>
</body>
</html>
