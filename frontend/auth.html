<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Sign in or create your ProfitPilot account - AI-Driven Retail Management for MSMEs.">
  <title>ProfitPilot - Sign In</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <h1>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #f97316;">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
            <polyline points="17 6 23 6 23 12"></polyline>
          </svg>
          ProfitPilot
        </h1>
        <p>AI-Driven Business Management for MSMEs</p>
      </div>

      <div class="auth-card">
        <!-- Tab Toggle -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
          <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Error/Success Messages -->
        <div class="auth-error" id="auth-error"></div>
        <div class="auth-success" id="auth-success"></div>

        <!-- Sign In Form -->
        <form id="signin-form" onsubmit="handleSignIn(event)">
          <div class="auth-field">
            <label>Email Address</label>
            <input type="email" class="auth-input" id="signin-email" placeholder="you@business.com" required>
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input type="password" class="auth-input" id="signin-password" placeholder="Enter your password" required>
          </div>
          <div style="text-align:right; margin-bottom:18px;">
            <span class="auth-link" onclick="handleForgotPassword()">Forgot Password?</span>
          </div>
          <button type="submit" class="auth-btn auth-btn-primary" id="signin-btn">Sign In</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" style="display:none;" onsubmit="handleSignUp(event)">
          <div class="auth-field">
            <label>Full Name</label>
            <input type="text" class="auth-input" id="signup-name" placeholder="Your full name" required>
          </div>
          <div class="auth-field">
            <label>Email Address</label>
            <input type="email" class="auth-input" id="signup-email" placeholder="you@business.com" required>
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input type="password" class="auth-input" id="signup-password" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="auth-field">
            <label>Confirm Password</label>
            <input type="password" class="auth-input" id="signup-confirm" placeholder="Re-enter password" required minlength="6">
          </div>
          <button type="submit" class="auth-btn auth-btn-primary" id="signup-btn">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">or continue with</div>

        <!-- Google Sign In -->
        <button class="auth-btn auth-btn-google" onclick="handleGoogleSignIn()" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <div style="text-align:center; margin-top:20px;">
          <a href="/" class="auth-link">← Back to ProfitPilot</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <!-- Mobile Nav + Service Worker -->
  <script>
    function toggleMobileNav() {
      document.getElementById('mobile-nav-overlay').classList.toggle('active');
      document.querySelector('.hamburger-btn').classList.toggle('active');
      document.body.style.overflow = document.getElementById('mobile-nav-overlay').classList.contains('active') ? 'hidden' : '';
    }
    function closeMobileNav() {
      document.getElementById('mobile-nav-overlay').classList.remove('active');
      document.querySelector('.hamburger-btn').classList.remove('active');
      document.body.style.overflow = '';
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('[PWA] Service Worker registered:', reg.scope);
        }).catch(err => console.log('[PWA] SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
