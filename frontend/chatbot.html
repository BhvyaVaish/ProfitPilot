<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProfitPilot - Assistant</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── Full Screen Chat Layout ─────────────────────────────── */
    .chat-page {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 72px); /* subtract header */
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 24px 0;
      gap: 0;
    }

    .chat-header-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .ai-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #d95f36, #c0392b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(217,95,54,0.4);
    }

    /* ── Chat Window ─────────────────────────────────────────── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 4px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── Message Bubbles ─────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: msgFadeIn 0.3s ease forwards;
      opacity: 0;
    }
    .msg-row.user-row { flex-direction: row-reverse; }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700;
    }
    .bot-avatar-sm  { background: linear-gradient(135deg, #d95f36, #c0392b); color: #fff; box-shadow: 0 0 10px rgba(217,95,54,0.3); }
    .user-avatar-sm { background: rgba(59,130,246,0.3); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }

    .msg-bubble {
      max-width: 72%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .bot-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-bottom-left-radius: 4px;
    }
    .user-bubble {
      background: linear-gradient(135deg, rgba(217,95,54,0.25), rgba(192,57,43,0.25));
      border: 1px solid rgba(217,95,54,0.35);
      border-bottom-right-radius: 4px;
      text-align: right;
    }

    /* ── Typing Indicator ─────────────────────────────────────── */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-orange);
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Quick Action Chips ───────────────────────────────────── */
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 0 10px;
      flex-shrink: 0;
    }
    .quick-chip {
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid rgba(217,95,54,0.35);
      background: rgba(217,95,54,0.08);
      color: #e07050;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .quick-chip:hover {
      background: rgba(217,95,54,0.2);
      border-color: var(--accent-orange);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(217,95,54,0.2);
    }

    /* ── Input Bar ───────────────────────────────────────────── */
    .chat-input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 0 24px;
      align-items: center;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      font-size: 0.95rem;
      padding: 14px 20px;
      border-radius: 30px;
    }
    #chat-input:focus { border-color: var(--accent-orange); box-shadow: 0 0 0 3px rgba(217,95,54,0.15); }

    #send-btn {
      border-radius: 50%;
      width: 48px; height: 48px;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-orange);"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
      ProfitPilot
    </div>
    <nav class="top-nav">
      <a href="index.html" class="nav-item">Home</a>
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="billing.html" class="nav-item">Billing</a>
      <a href="inventory.html" class="nav-item">Inventory</a>
      <a href="tax.html" class="nav-item">Tax Estimator</a>
      <a href="chatbot.html" class="nav-item active">Assistant</a>
    </nav>
    <div class="user-profile">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="text-muted" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </header>

  <div class="chat-page">

    <!-- Header -->
    <div class="chat-header-strip">
      <div class="ai-avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 2L12 5M12 19L12 22M2 12L5 12M19 12L22 12M4.22 4.22L6.34 6.34M17.66 17.66L19.78 19.78M19.78 4.22L17.66 6.34M6.34 17.66L4.22 19.78"></path></svg>
      </div>
      <div>
        <div style="font-weight:700; font-size:1rem;">ProfitPilot Assistant</div>
        <div class="text-muted" style="font-size:0.8rem;">🟢 Online · Decision-making AI · Data-driven</div>
      </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chat-window">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick Action Chips -->
    <div class="quick-chips">
      <button class="quick-chip" onclick="quickSend('What should I restock?')">📦 What to restock?</button>
      <button class="quick-chip" onclick="quickSend('What sells the most?')">🏆 Top products</button>
      <button class="quick-chip" onclick="quickSend('What is not selling?')">📉 Dead stock</button>
      <button class="quick-chip" onclick="quickSend('Any upcoming festival demand?')">🗓️ Festival demand</button>
      <button class="quick-chip" onclick="quickSend('What should I do today?')">⚡ What to do today</button>
      <button class="quick-chip" onclick="quickSend('Show me today sales')">💰 Today's sales</button>
    </div>

    <!-- Input Bar -->
    <div class="chat-input-bar">
      <input type="text" id="chat-input" class="input-control" placeholder="Ask anything about your business…" autocomplete="off">
      <button class="btn btn-primary" id="send-btn" onclick="handleSend()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
