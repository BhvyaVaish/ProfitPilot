<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ProfitPilot AI Assistant - Ask business questions and get data-driven answers for your MSME.">
  <title>ProfitPilot - Intelligent Business Assistant for MSMEs</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .chat-layout { display: flex; flex-direction: column; height: calc(100vh - 180px); max-height: 700px; }
    .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); }
    .msg-row { display: flex; gap: 10px; align-items: flex-start; animation: fadeInUp 0.3s ease; }
    .msg-row.user-row { flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; font-family: var(--font-display); }
    .bot-avatar-sm { background: var(--accent-blue); color: #fff; }
    .user-avatar-sm { background: var(--accent-orange); color: #fff; }
    .msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 14px; line-height: 1.6; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }
    .bot-bubble { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .user-bubble { background: var(--accent-blue); color: #fff; border-bottom-right-radius: 4px; }
    .typing-indicator { display: flex; align-items: center; gap: 3px; padding: 4px 0; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: typingBounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-input-row { display: flex; gap: 10px; margin-top: 14px; }
    .chat-input-row input { flex: 1; }
    .quick-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .quick-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--bg-card); cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: all 0.2s; color: var(--text-muted); font-family: var(--font-body); }
    .quick-chip:hover { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(37,99,235,0.04); }
    @media (max-width: 768px) {
      .chat-layout { height: calc(100vh - 160px); max-height: none; }
      .msg-bubble { max-width: 85%; font-size: 0.88rem; }
      .quick-chips { gap: 6px; }
      .quick-chip { font-size: 0.75rem; padding: 5px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-orange);"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg> ProfitPilot</div>
    <nav class="top-nav">
      <a href="index.html" class="nav-item">Home</a>
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="billing.html" class="nav-item">Billing</a>
      <a href="inventory.html" class="nav-item">Inventory</a>
      <a href="tax.html" class="nav-item">Tax</a>
      <a href="chatbot.html" class="nav-item active">Assistant</a>
      <a href="about.html" class="nav-item">About</a>
    </nav>
    <div class="lang-toggle" onclick="toggleLanguage()">
      <span class="lang-en active">EN</span><span class="lang-hi">HI</span>
    </div>
    <div class="user-profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-muted" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>AI Business Assistant</h2>
        <p class="text-muted" style="margin-top: 4px;">Ask anything about your business - powered by your real data.</p>
      </div>
    </div>

    <div class="chat-layout">
      <div class="chat-window" id="chat-window"></div>

      <div class="chat-input-row">
        <input type="text" id="chat-input" class="input-control" placeholder="Ask me anything about your business...">
        <button class="btn btn-primary" onclick="handleSend()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
      </div>

      <div class="quick-chips">
        <button class="quick-chip" onclick="quickSend('What should I restock?')">Restock</button>
        <button class="quick-chip" onclick="quickSend('What sells the most?')">Top Selling</button>
        <button class="quick-chip" onclick="quickSend('What is not selling?')">Dead Stock</button>
        <button class="quick-chip" onclick="quickSend('Any upcoming festival demand?')">Festivals</button>
        <button class="quick-chip" onclick="quickSend('What should I do today?')">Today's Plan</button>
        <button class="quick-chip" onclick="quickSend('How is my profit?')">Profit</button>
        <button class="quick-chip" onclick="quickSend('Tell me about GST')">GST / Tax</button>
        <button class="quick-chip" onclick="quickSend('Show today sales')">Sales</button>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    ProfitPilot v2.0 &mdash; AI-Driven Retail Management for MSMEs<br>
    <div style="margin-top: 6px; font-size: 0.82rem; color: var(--text-muted);">
      &copy; 2026. Made by <a href="https://github.com/bhvyavaish/" target="_blank" style="color:var(--text-primary); font-weight: 500; text-decoration:underline;">Bhvya Vaish</a>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
